version: 2

models:
  - name: int_stock_prices_joined
    description: >
      Foundation intermediate model that joins cleaned stock prices with company
      metadata. All downstream intermediate and mart models build on top of this.
    columns:
      - name: stock_price_id
        description: "Surrogate key from stg_stock_prices (ticker + price_date)."
        tests:
          - not_null
          - unique

      - name: ticker
        description: "Stock ticker symbol."
        tests:
          - not_null

      - name: price_date
        description: "Trading date."
        tests:
          - not_null

      - name: open_price
        description: "Opening price on the trading day."
        tests:
          - not_null

      - name: high_price
        description: "Highest price on the trading day."
        tests:
          - not_null

      - name: low_price
        description: "Lowest price on the trading day."
        tests:
          - not_null

      - name: close_price
        description: "Closing price on the trading day."
        tests:
          - not_null

      - name: volume
        description: "Shares traded on the trading day."
        tests:
          - not_null

      - name: price_change
        description: "Absolute change from open to close."

      - name: pct_change_open_to_close
        description: "Percentage change from open to close."

      - name: company_id
        description: "Surrogate key from stg_company_metadata."

      - name: company_name
        description: "Full legal company name."

      - name: sector
        description: "Industry sector."

      - name: industry
        description: "Specific industry within the sector."

      - name: country
        description: "Country of incorporation."

      - name: exchange
        description: "Stock exchange."

      - name: currency
        description: "Trading currency."

      - name: market_cap_usd
        description: "Market capitalisation in USD."

      - name: market_cap_category
        description: "Derived size category based on market cap."

      - name: full_time_employees
        description: "Number of full-time employees."

      - name: ingested_at
        description: "Timestamp of raw data ingestion."

      - name: dbt_updated_at
        description: "Timestamp of last dbt model run."

  - name: int_stock_daily_returns
    description: >
      Calculates day-over-day return metrics per ticker using LAG window functions.
      Also computes intraday range and trading day sequence number.
    columns:
      - name: stock_price_id
        description: "Surrogate key (ticker + price_date)."
        tests:
          - not_null
          - unique

      - name: ticker
        description: "Stock ticker symbol."
        tests:
          - not_null

      - name: price_date
        description: "Trading date."
        tests:
          - not_null

      - name: prev_close_price
        description: "Closing price of the previous trading day. Null for first trading day."

      - name: daily_return_pct
        description: >
          Percentage return based on previous close price.
          Null for the first trading day of each ticker.

      - name: intraday_range
        description: "Absolute difference between high and low price on the trading day."
        tests:
          - not_null

      - name: intraday_range_pct
        description: "Intraday range as a percentage of closing price."
        tests:
          - not_null

      - name: trading_day_seq
        description: "Sequential trading day number per ticker starting from 1."
        tests:
          - not_null

  - name: int_stock_moving_averages
    description: >
      Adds 7, 30, and 90-day simple moving averages (SMA) for price and volume
      on top of daily returns. Also derives a price vs SMA signal and cumulative
      average return per ticker.
    columns:
      - name: stock_price_id
        description: "Surrogate key (ticker + price_date)."
        tests:
          - not_null
          - unique

      - name: ticker
        description: "Stock ticker symbol."
        tests:
          - not_null

      - name: price_date
        description: "Trading date."
        tests:
          - not_null

      - name: sma_7d
        description: "7-day simple moving average of closing price."
        tests:
          - not_null

      - name: sma_30d
        description: "30-day simple moving average of closing price."
        tests:
          - not_null

      - name: sma_90d
        description: "90-day simple moving average of closing price."
        tests:
          - not_null

      - name: vol_ma_7d
        description: "7-day simple moving average of trading volume."
        tests:
          - not_null

      - name: vol_ma_30d
        description: "30-day simple moving average of trading volume."
        tests:
          - not_null

      - name: cumulative_avg_return_pct
        description: "Cumulative average daily return percentage from first trading day."

      - name: price_vs_sma_30d
        description: "Signal indicating whether close price is above, below or at the 30-day SMA."
        tests:
          - not_null
          - accepted_values:
              values: ['Above 30d MA', 'Below 30d MA', 'At 30d MA']